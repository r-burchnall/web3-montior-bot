global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - "rules/*.yml"

scrape_configs:
  - job_name: 'arbitrage'
    static_configs:
      - targets: ['otel-collector:8889']

  - job_name: 'fcsc-agent'
    scrape_interval: 5s
    file_sd_configs:
      - files:
          - 'targets/vm-health.yml'
        refresh_interval: 30s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - grafana:3000
